<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Tarefa</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#0c1919;
  color:white;
  padding:32px 16px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:460px;
  background:#1a4648;
  border:1px solid #1d7276;
  border-radius:16px;
  padding:20px;
}

.manual{
  width:100%;
  border-radius:12px;
  margin-bottom:20px;
  cursor:zoom-in;
}

/* CONTROLE TEMPO */
.time-control{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  gap:10px;
}

.time-box{
  flex:1;
  text-align:center;
  background:#0c1919;
  border:1px solid #1d7276;
  border-radius:10px;
  padding:10px;
}

.time-value{
  font-size:20px;
  margin:6px 0;
}

.btn{
  cursor:pointer;
  padding:6px;
  font-size:18px;
}

/* FORM */
input,select,button,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:15px;
}

input,select,textarea{
  background:#0c1919;
  color:white;
  border:1px solid #1d7276;
}

textarea{
  min-height:100px;
}

button{
  background:#1de1ea;
  color:#0c1919;
  border:none;
  font-weight:bold;
}

.msg{color:#1de1ea;}

.back{
  display:inline-block;
  margin-top:15px;
  color:#d7eeee;
  text-decoration:none;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox.open{display:flex;}
.lightbox img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<div class="container">

<img src="./manual.png" class="manual" id="manual">

<h2>Registrar Tarefa</h2>

<form id="form">

<input id="data" type="date">

<select id="nome" required>
<option value="">Integrante</option>
<option>Isabella Greicy Silva</option>
<option>Bruna Stefani Rodrigues Souza</option>
<option>Danheni Gonçalves dos Santos</option>
<option>Caio Rodrigues</option>
<option>George de Almeida Neves</option>
<option>Lucas Kerkovsky Ronconi</option>
<option>Thalia Das Graças Oliveira</option>
<option>Wesley Junior</option>
</select>

<select id="etapa" required>
<option value="">Etapa</option>
<option value="Briefing">Briefing</option>
<option value="Roteiro">Roteiro</option>
<option value="Produção">Produção</option>
<option value="Pós">Pós</option>
<option value="Entrega">Entrega</option>
</select>

<select id="tarefa" required>
<option value="">Tarefa</option>
</select>

<!-- CONTROLE TEMPO -->
<div class="time-control">

  <div class="time-box">
    <div class="btn" onclick="incHora()">▲</div>
    <div id="hora" class="time-value">0</div>
    <div class="btn" onclick="decHora()">▼</div>
  </div>

  <div class="time-box">
    <div class="btn" onclick="incMin()">▲</div>
    <div id="min" class="time-value">00</div>
    <div class="btn" onclick="decMin()">▼</div>
  </div>

</div>

<textarea id="observacoes" placeholder="Observações"></textarea>

<button type="submit">Registrar</button>

</form>

<p class="msg" id="msg"></p>

<a href="index.html" class="back">← Voltar</a>

</div>

<div class="lightbox" id="lightbox">
  <img src="./manual.png">
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVDe9FV8Br8a1yTXqRV-cSa2JI0wv2k4BNvZ4BRizhFnOx0YyA5R9X01-ynWQ-f1Gv/exec";

/* TAREFAS */
const tarefas = {
  Briefing:[
    "Reunião com cliente",
    "Levantamento técnico",
    "Definição de escopo",
    "Pesquisa de referências"
  ],
  Roteiro:[
    "Roteiro",
    "Decupagem",
    "Storyboard",
    "Planejamento técnico"
  ],
  Produção:[
    "Captação de imagem",
    "Captação de áudio",
    "Iluminação",
    "Operação de câmera",
    "Direção",
    "Produção de set"
  ],
  Pós:[
    "Edição (corte)",
    "Montagem",
    "Design de som",
    "Mixagem",
    "Correção de cor",
    "Finalização"
  ],
  Entrega:[
    "Exportação",
    "Envio ao cliente",
    "Revisão",
    "Arquivamento"
  ]
};

etapa.onchange = () => {
  tarefa.innerHTML = '<option value="">Tarefa</option>';
  tarefas[etapa.value]?.forEach(t=>{
    let op=document.createElement("option");
    op.value=t;
    op.textContent=t;
    tarefa.appendChild(op);
  });
};

/* DATA */
data.value = new Date().toISOString().split("T")[0];

/* TEMPO */
let h=0;
let m=0;

function atualizar(){
  hora.innerText = h;
  min.innerText = String(m).padStart(2,"0");
}

function incHora(){ h++; atualizar(); }
function decHora(){ if(h>0)h--; atualizar(); }

function incMin(){
  m+=5;
  if(m>=60){ m=0; h++; }
  atualizar();
}

function decMin(){
  m-=5;
  if(m<0){
    if(h>0){ h--; m=55; }
    else m=0;
  }
  atualizar();
}

atualizar();

/* ENVIO */
form.onsubmit = async (e)=>{
  e.preventDefault();

  const horas = h + (m/60);

  const dados={
    data:data.value,
    nome:nome.value,
    etapa:etapa.value,
    tarefa:tarefa.value,
    horas:horas,
    observacoes:observacoes.value
  };

  msg.innerText="Enviando...";

  try{
    let res=await fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify(dados)
    });

    let r=await res.json();

    msg.innerText = r.success ? "Registrado ✔" : "Erro";

    form.reset();
    h=0; m=0; atualizar();

  }catch{
    msg.innerText="Erro conexão";
  }
};

/* LIGHTBOX */
manual.onclick=()=>lightbox.classList.add("open");
lightbox.onclick=()=>lightbox.classList.remove("open");
</script>

</body>
</html>
