<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
      padding: 32px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: white;
      border: 1px solid #555;
      padding: 12px 20px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      transition: 0.2s;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 32px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #17171d;
      border: 1px solid #2b2b35;
      border-radius: 14px;
      padding: 18px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #bdbdc7;
      font-weight: normal;
    }

    .card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select, input {
      background: #17171d;
      color: white;
      border: 1px solid #2b2b35;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .panel {
      background: #17171d;
      border: 1px solid #2b2b35;
      border-radius: 14px;
      padding: 18px;
      min-height: 320px;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .chart-box {
      position: relative;
      height: 240px;
    }

    .tabela-wrap {
      background: #17171d;
      border: 1px solid #2b2b35;
      border-radius: 14px;
      padding: 18px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #2b2b35;
      text-align: left;
    }

    th {
      color: #bdbdc7;
      font-weight: normal;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .back-link {
      color: #d3d3db;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    @media (max-width: 1100px) {
      .grid3 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .grid2 {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .top-actions,
      .topbar,
      .back-link {
        display: none !important;
      }

      body {
        background: white;
        color: black;
      }

      .card, .panel, .tabela-wrap {
        border: 1px solid #ccc;
        background: white;
        color: black;
      }

      th, td {
        border-bottom: 1px solid #ccc;
        color: black;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-actions">
      <a href="entrega.html" class="btn">Entregas</a>
      <button onclick="window.print()" class="btn">Imprimir</button>
    </div>

    <h1>Dashboard da Equipe</h1>

    <div class="topbar">
      <select id="filtroEtapa">
        <option value="">Todas as etapas</option>
        <option value="Briefing">Briefing</option>
        <option value="Roteiro">Roteiro</option>
        <option value="Produção">Produção</option>
        <option value="Pós">Pós</option>
        <option value="Entrega">Entrega</option>
      </select>

      <input type="text" id="filtroNome" placeholder="Filtrar por nome">
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total de tarefas</h3>
        <p id="totalTarefas">0</p>
      </div>
      <div class="card">
        <h3>Horas totais</h3>
        <p id="totalHoras">0</p>
      </div>
      <div class="card">
        <h3>Membros ativos</h3>
        <p id="totalPessoas">0</p>
      </div>
      <div class="card">
        <h3>Etapa mais usada</h3>
        <p id="etapaMaisUsada">-</p>
      </div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>Tarefas por pessoa</h2>
        <div class="chart-box">
          <canvas id="graficoTarefas"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>Horas por pessoa</h2>
        <div class="chart-box">
          <canvas id="graficoHoras"></canvas>
        </div>
      </div>
    </div>

    <div class="grid3">
      <div class="panel">
        <h2>Tarefas por etapa</h2>
        <div class="chart-box">
          <canvas id="graficoEtapas"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>Top 5 tarefas</h2>
        <div class="chart-box">
          <canvas id="graficoTopTarefas"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>Horas por etapa</h2>
        <div class="chart-box">
          <canvas id="graficoHorasEtapa"></canvas>
        </div>
      </div>
    </div>

    <div class="tabela-wrap">
      <h2 style="margin-top:0;">Tarefas registradas</h2>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Nome</th>
            <th>Etapa</th>
            <th>Tarefa</th>
            <th>Horas</th>
            <th>Observações</th>
          </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
      </table>
    </div>

    <a href="index.html" class="back-link">← Voltar</a>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVDe9FV8Br8a1yTXqRV-cSa2JI0wv2k4BNvZ4BRizhFnOx0YyA5R9X01-ynWQ-f1Gv/exec";

    let graficoTarefas;
    let graficoHoras;
    let graficoEtapas;
    let graficoTopTarefas;
    let graficoHorasEtapa;
    let dadosOriginais = [];

    async function carregarDados() {
      try {
        const resposta = await fetch(SCRIPT_URL);
        const dados = await resposta.json();

        if (!Array.isArray(dados)) throw new Error("Resposta inválida");

        dadosOriginais = dados;
        aplicarFiltros();
      } catch (erro) {
        console.error(erro);
        document.getElementById("tabelaBody").innerHTML =
          '<tr><td colspan="6">Erro ao carregar os dados.</td></tr>';
      }
    }

    function aplicarFiltros() {
      const etapaFiltro = document.getElementById("filtroEtapa").value.trim().toLowerCase();
      const nomeFiltro = document.getElementById("filtroNome").value.trim().toLowerCase();

      const dadosFiltrados = dadosOriginais.filter(item => {
        const etapa = String(item.etapa || "").toLowerCase();
        const nome = String(item.nome || "").toLowerCase();

        const okEtapa = !etapaFiltro || etapa === etapaFiltro;
        const okNome = !nomeFiltro || nome.includes(nomeFiltro);

        return okEtapa && okNome;
      });

      renderizarDashboard(dadosFiltrados);
    }

    function renderizarDashboard(dados) {
      const tabelaBody = document.getElementById("tabelaBody");
      tabelaBody.innerHTML = "";

      const porPessoaTarefas = {};
      const porPessoaHoras = {};
      const porEtapa = {};
      const porTarefa = {};
      const horasPorEtapa = {};
      let totalHoras = 0;

      dados.forEach(item => {
        const nome = item.nome || "Sem nome";
        const etapa = item.etapa || "Sem etapa";
        const tarefa = item.tarefa || "Sem tarefa";
        const horas = parseFloat(item.horas) || 0;

        porPessoaTarefas[nome] = (porPessoaTarefas[nome] || 0) + 1;
        porPessoaHoras[nome] = (porPessoaHoras[nome] || 0) + horas;
        porEtapa[etapa] = (porEtapa[etapa] || 0) + 1;
        porTarefa[tarefa] = (porTarefa[tarefa] || 0) + 1;
        horasPorEtapa[etapa] = (horasPorEtapa[etapa] || 0) + horas;
        totalHoras += horas;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.data || ""}</td>
          <td>${item.nome || ""}</td>
          <td>${item.etapa || ""}</td>
          <td>${item.tarefa || ""}</td>
          <td>${item.horas || ""}</td>
          <td>${item.observacoes || ""}</td>
        `;
        tabelaBody.appendChild(tr);
      });

      document.getElementById("totalTarefas").textContent = dados.length;
      document.getElementById("totalHoras").textContent = totalHoras.toFixed(2);
      document.getElementById("totalPessoas").textContent = Object.keys(porPessoaTarefas).length;
      document.getElementById("etapaMaisUsada").textContent = obterMaisUsado(porEtapa);

      criarOuAtualizarGraficos(
        porPessoaTarefas,
        porPessoaHoras,
        porEtapa,
        porTarefa,
        horasPorEtapa
      );
    }

    function obterMaisUsado(obj) {
      let maior = "-";
      let valor = 0;

      Object.keys(obj).forEach(chave => {
        if (obj[chave] > valor) {
          valor = obj[chave];
          maior = chave;
        }
      });

      return maior;
    }

    function criarOuAtualizarGraficos(porPessoaTarefas, porPessoaHoras, porEtapa, porTarefa, horasPorEtapa) {
      const nomes = Object.keys(porPessoaTarefas);
      const tarefasPessoa = nomes.map(nome => porPessoaTarefas[nome]);
      const horasPessoa = nomes.map(nome => porPessoaHoras[nome]);

      const etapas = Object.keys(porEtapa);
      const tarefasEtapa = etapas.map(etapa => porEtapa[etapa]);
      const horasEtapa = etapas.map(etapa => horasPorEtapa[etapa]);

      const topTarefas = Object.entries(porTarefa)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      const topLabels = topTarefas.map(item => item[0]);
      const topValores = topTarefas.map(item => item[1]);

      if (graficoTarefas) graficoTarefas.destroy();
      if (graficoHoras) graficoHoras.destroy();
      if (graficoEtapas) graficoEtapas.destroy();
      if (graficoTopTarefas) graficoTopTarefas.destroy();
      if (graficoHorasEtapa) graficoHorasEtapa.destroy();

      graficoTarefas = new Chart(document.getElementById("graficoTarefas"), {
        type: "bar",
        data: {
          labels: nomes,
          datasets: [{ label: "Tarefas", data: tarefasPessoa }]
        },
        options: getBarOptions()
      });

      graficoHoras = new Chart(document.getElementById("graficoHoras"), {
        type: "bar",
        data: {
          labels: nomes,
          datasets: [{ label: "Horas", data: horasPessoa }]
        },
        options: getBarOptions()
      });

      graficoEtapas = new Chart(document.getElementById("graficoEtapas"), {
        type: "bar",
        data: {
          labels: etapas,
          datasets: [{ label: "Tarefas", data: tarefasEtapa }]
        },
        options: getBarOptions()
      });

      graficoTopTarefas = new Chart(document.getElementById("graficoTopTarefas"), {
        type: "bar",
        data: {
          labels: topLabels,
          datasets: [{ label: "Registros", data: topValores }]
        },
        options: getBarOptions()
      });

      graficoHorasEtapa = new Chart(document.getElementById("graficoHorasEtapa"), {
        type: "bar",
        data: {
          labels: etapas,
          datasets: [{ label: "Horas", data: horasEtapa }]
        },
        options: getBarOptions()
      });
    }

    function getBarOptions() {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: {
            ticks: { color: "white" },
            grid: { color: "rgba(255,255,255,0.08)" }
          },
          y: {
            beginAtZero: true,
            ticks: { color: "white" },
            grid: { color: "rgba(255,255,255,0.08)" }
          }
        }
      };
    }

    document.getElementById("filtroEtapa").addEventListener("change", aplicarFiltros);
    document.getElementById("filtroNome").addEventListener("input", aplicarFiltros);

    carregarDados();
  </script>
</body>
</html>
