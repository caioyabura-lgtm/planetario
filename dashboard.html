<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
</head>
<body style="background:#111;color:white;font-family:sans-serif;padding:40px">

<h2>Dashboard</h2>

<div id="resumo"></div>
<hr>
<ul id="lista"></ul>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVDe9FV8Br8a1yTXqRV-cSa2JI0wv2k4BNvZ4BRizhFnOx0YyA5R9X01-ynWQ-f1Gv/exec";

async function carregar() {
  try {
    const res = await fetch(SCRIPT_URL);
    const dados = await res.json();

    const lista = document.getElementById("lista");
    const resumo = document.getElementById("resumo");

    lista.innerHTML = "";
    resumo.innerHTML = "";

    let porPessoa = {};
    let totalHoras = 0;

    dados.forEach(function(item) {
      const li = document.createElement("li");
      li.textContent =
        (item.nome || "") + " | " +
        (item.etapa || "") + " | " +
        (item.tarefa || "") + " | " +
        (item.horas || 0) + "h";

      lista.appendChild(li);

      const nome = item.nome || "Sem nome";
      const horas = parseFloat(item.horas) || 0;

      if (!porPessoa[nome]) {
        porPessoa[nome] = { tarefas: 0, horas: 0 };
      }

      porPessoa[nome].tarefas += 1;
      porPessoa[nome].horas += horas;
      totalHoras += horas;
    });

    Object.keys(porPessoa).forEach(function(nome) {
      const p = porPessoa[nome];
      const div = document.createElement("div");
      div.innerHTML = "<b>" + nome + "</b>: " + p.tarefas + " tarefas / " + p.horas + "h";
      resumo.appendChild(div);
    });

    const total = document.createElement("div");
    total.innerHTML = "<br><b>Total:</b> " + dados.length + " tarefas / " + totalHoras + "h";
    resumo.appendChild(total);

  } catch (erro) {
    document.getElementById("resumo").innerText = "Erro ao carregar dashboard.";
  }
}

carregar();
</script>

<br><a href="index.html">Voltar</a>

</body>
</html>
