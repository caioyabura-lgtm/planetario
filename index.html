<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision - Gestão</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .eye {
      width: 350px;
      margin-bottom: 52,5px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 16px;
    }

    a {
      text-decoration: none;
      color: white;
      border: 1px solid #555;
      padding: 12px 20px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    a:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <div class="overlay">
    <img src="./olho.png" class="eye">
    <h1>Vision Audiovisual</h1>
    <p>Painel de gestão do projeto</p>

    <div class="buttons">
      <a href="registrar.html">Registrar tarefa</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>

  <script src="main.js"></script>

</body>
</html>
